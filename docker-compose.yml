services:
  eas-builder:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - .:/app
      - node_modules_linux:/app/node_modules
    working_dir: /app
    environment:
      - PROFILE=${PROFILE:-development}
    stdin_open: true
    tty: true

volumes:
  node_modules_linux:
